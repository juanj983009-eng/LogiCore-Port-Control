spring.application.name=inbound-yard-service
server.port=8081
# Configuración de Conexión a la Base de Datos Dockerizada
spring.datasource.url=jdbc:postgresql://localhost:5432/yard_management
spring.datasource.username=logicore_user
spring.datasource.password=yard_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Hibernate / JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ddl-auto=update creará las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.services.audit.url=http://audit-history-service:8083/api/v1/audit/logs

